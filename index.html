  <style>
    body {
      font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #030303;
      color: #fafafa;
      overflow-x: hidden;
    }
    
    .font-serif {
      font-family: 'Playfair Display', Georgia, serif;
    }
    
    .font-display {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Glassmorphism Styles */
    .glass-panel {
      background: rgba(10, 10, 12, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .glass-panel-hover:hover {
      background: rgba(16, 16, 22, 0.85);
      border-color: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.08);
      transform: translateY(-3px);
    }

    /* Cyber grid overlay */
    .cyber-grid {
      background-size: 40px 40px;
      background-image: 
      linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
    }

    .radial-glow {
      background: radial-gradient(circle 800px at 50% 200px, rgba(120, 119, 198, 0.06), transparent);
    }

    /* Glowing gradient animations */
    .gradient-glow {
      background: linear-gradient(135deg, #a855f7 0%, #3b82f6 50%, #10b981 100%);
      background-size: 200% 200%;
      animation: gradient-shift 10s ease infinite;
    }

    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .pulse-slow {
      animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.25; }
    }

    /* Premium outline border glow */
    .glow-card {
      position: relative;
    }
    .glow-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(to bottom right, rgba(255,255,255,0.08), rgba(255,255,255,0.01));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #030303;
    }
    ::-webkit-scrollbar-thumb {
      background: #222;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #333;
    }

    /* Pulse active dot */
    .live-dot {
      position: relative;
    }
    .live-dot::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: inherit;
      animation: ripple 1.6s infinite ease-out;
      top: 0;
      left: 0;
      opacity: 0.8;
    }

    @keyframes ripple {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(2.8); opacity: 0; }
    }
  </style>
</head>

    // Navbar Component
    function Navbar({ profile }) {
      const [isOpen, setIsOpen] = useState(false);

          setScrolled(window.scrollY > 20);
          const sections = ["hero", "about", "experience", "projects", "research", "stack", "contact"];

            const el = document.getElementById(section);
            if (el) {
              const rect = el.getBoundingClientRect();
              return rect.top <= 120 && rect.bottom >= 120;
            }
            return false;
          });
          if (current) setActiveSection(current);
        };

        window.addEventListener("scroll", handleScroll);
        return () => window.removeEventListener("scroll", handleScroll);
      }, []);

      const navItems = [

      const [pulseVal, setPulseVal] = useState(72);

      const words = profile.tagline.split(" ");
      const prefix = words.slice(0, words.length - 3).join(" ");
      const suffix = words.slice(words.length - 3).join(" ");

      const researchPillars = [
        "On-device neural network deployment (TFLite, ONNX)",
        "Real-time biosignal telemetry (EEG, ECG, PPG)",
        "Ultra-low latency wearable mesh communication",

      ];

      const codeFiles = {
        "model.py": `import tensorflow as tf

class BiosignalNet(tf.keras.Model):
    def __init__(self):
        super().__init__()
        # Conv1D for temporal features
        self.conv1 = tf.keras.layers.Conv1D(32, 3, activation='relu')
        self.lstm = tf.keras.layers.LSTM(64)
        self.dense = tf.keras.layers.Dense(1, activation='sigmoid')

    def call(self, x):
        x = self.conv1(x)
        x = self.lstm(x)
        return self.dense(x)

# Model optimized for edge inference
model = BiosignalNet()
converter = tf.lite.TFLiteConverter.from_keras_model(model)
tflite_model = converter.convert()`,
        "wearos.kt": `package com.harshit.wearable.sensor

import android.hardware.Sensor
import android.hardware.SensorEvent
import android.hardware.SensorEventListener

                  project.featured ? "md:col-span-2 border-purple-500/20 shadow-[0_0_35px_rgba(168,85,247,0.05)]" : "border-zinc-800/60"
                }`}>
                  <div>
                    <div className="flex items-center justify-between mb-6">
                      <div className="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center text-purple-400">
                        {getIcon(project.icon)}
                      </div>
                      <a href={project.github} target="_blank" rel="noopener noreferrer" className="p-2 rounded-lg bg-zinc-950 hover:bg-zinc-900 border border-zinc-850 hover:text-white transition-colors text-zinc-400">
                        <Icons.Github />
                      </a>
                    </div>

                    <h4 className="text-xl font-bold text-white mb-3">{project.title}</h4>
                    <p className="text-zinc-400 text-sm leading-relaxed mb-6">{project.desc}</p>
                  </div>

                  <div>
                    <div className="px-4 py-2 rounded-xl bg-zinc-950 border border-zinc-900 text-xs font-mono text-zinc-400 mb-6 flex items-center gap-2">
                      <div className="text-purple-400"><Icons.Heart /></div>
                      <span>{project.metrics}</span>
                    </div>

                    <div className="flex flex-wrap gap-2">
                      {project.tags.map((tag, tIdx) => (
                        <span key={tIdx} className="px-2.5 py-1 rounded-md bg-zinc-900 border border-zinc-855 text-xs text-zinc-300 font-mono">{tag}</span>
                      ))}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // Research Component
    function Research({ research }) {
      // Illustrations
      const illustrations = [
        <svg key="1" className="w-16 h-16 text-purple-400 opacity-80 mb-4" viewBox="0 0 100 100" fill="none">
          <path d="M10 50 H35 L42 20 L48 80 L55 50 H90" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
        </svg>,
        <svg key="2" className="w-16 h-16 text-blue-400 opacity-80 mb-4" viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="20" r="6" stroke="currentColor" strokeWidth="2" />
          <circle cx="25" cy="50" r="6" stroke="currentColor" strokeWidth="2" />
          <circle cx="75" cy="50" r="6" stroke="currentColor" strokeWidth="2" />
          <circle cx="50" cy="80" r="6" stroke="currentColor" strokeWidth="2" />
          <line x1="50" y1="26" x2="25" y2="44" stroke="currentColor" strokeWidth="2" />
          <line x1="50" y1="26" x2="75" y2="44" stroke="currentColor" strokeWidth="2" />
          <line x1="25" y1="56" x2="50" y2="74" stroke="currentColor" strokeWidth="2" />
          <line x1="75" y1="56" x2="50" y2="74" stroke="currentColor" strokeWidth="2" />
        </svg>,
        <svg key="3" className="w-16 h-16 text-pink-400 opacity-80 mb-4" viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="8" stroke="currentColor" strokeWidth="2.5" />
          <circle cx="20" cy="30" r="4" fill="currentColor" />
          <circle cx="80" cy="35" r="4" fill="currentColor" />
          <circle cx="35" cy="80" r="4" fill="currentColor" />
          <line x1="50" y1="50" x2="20" y2="30" stroke="currentColor" strokeWidth="1.5" opacity="0.4" />
          <line x1="50" y1="50" x2="80" y2="35" stroke="currentColor" strokeWidth="1.5" opacity="0.4" />
          <line x1="50" y1="50" x2="35" y2="80" stroke="currentColor" strokeWidth="1.5" opacity="0.4" />
        </svg>
      ];

      return (
        <section id="research" className="py-32 relative overflow-hidden bg-[#030303]">
          <div className="absolute bottom-0 right-0 w-96 h-96 bg-purple-500/5 rounded-full blur-[120px] pointer-events-none" />

          <div className="max-w-7xl mx-auto px-6 relative z-10">
            <div className="text-center max-w-2xl mx-auto mb-20">
              <h2 className="text-xs font-mono tracking-widest text-purple-400 uppercase mb-4">
                04 // Academics
              </h2>
              <h3 className="text-3xl sm:text-5xl font-bold tracking-tight text-white leading-tight">
                Scientific Pillars &{" "}
                <span className="font-serif italic font-normal text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-400 to-indigo-400">
                  Investigation Areas
                </span>
              </h3>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              {research.map((interest, idx) => (
                <div key={idx} className="glass-panel p-8 sm:p-10 rounded-3xl glow-card hover:border-zinc-800 transition-all duration-500 flex flex-col justify-between relative overflow-hidden group">
                  <div>
                    <div className="font-serif italic text-purple-400 text-sm sm:text-base mb-6 tracking-wide font-normal">
                      [ {interest.title.split(" & ")[0]} ]
                    </div>

                    <div className="flex justify-start">
                      {illustrations[idx]}
                    </div>

                    <h5 className="text-[10px] text-zinc-500 font-mono tracking-wider mb-2">
                      {interest.subtitle}
                    </h5>

                    <h4 className="text-lg sm:text-xl font-bold text-white leading-snug mb-4">
                      {interest.title}
                    </h4>

                    <p className="text-zinc-400 text-sm leading-relaxed mb-6">
                      {interest.desc}
                    </p>
                  </div>

                  <div className="mt-8 pt-4 border-t border-zinc-950 flex items-center justify-between text-zinc-500 text-xs font-mono">
                    <span className="flex items-center gap-1.5">
                      <span className="text-purple-400"><Icons.FileText /></span>
                      Active Investigation
                    </span>
                    <span>{interest.id}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // TechStack Component
    function TechStack({ techStack }) {
      return (
        <section id="stack" className="py-24 relative overflow-hidden bg-[#030303]">
          <div className="absolute top-1/4 right-0 w-80 h-80 bg-emerald-500/5 rounded-full blur-[100px] pointer-events-none" />

          <div className="max-w-6xl mx-auto px-6 relative z-10">
            <div className="text-center max-w-2xl mx-auto mb-16">
              <h2 className="text-xs font-mono tracking-widest text-purple-400 uppercase mb-3">05 // Toolkit</h2>
              <h3 className="text-3xl sm:text-4xl font-bold tracking-tight text-white font-display">Technical Capabilities</h3>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {techStack.map((category, idx) => (
                <div key={idx} className="glass-panel p-8 rounded-3xl glow-card hover:border-zinc-700/80 transition-all duration-300">
                  <div className="flex items-center gap-3 mb-6">
                    <div className="w-8 h-8 rounded-lg bg-zinc-900 border border-zinc-800 flex items-center justify-center text-purple-400">
                      {getIcon(category.icon)}
                    </div>
                    <h4 className="font-bold text-white text-sm tracking-wide uppercase">{category.title}</h4>
                  </div>

                  <div className="flex flex-wrap gap-2.5">
                    {category.skills.map((skill, sIdx) => (
                      <span key={sIdx} className="px-3 py-1.5 rounded-lg bg-zinc-950 border border-zinc-900 text-xs font-mono text-zinc-300 hover:text-white hover:border-zinc-800 transition-colors cursor-default">
                        {skill}
                      </span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // Achievements Component
    function Achievements({ achievements }) {
      return (
        <section id="achievements" className="py-24 relative overflow-hidden bg-[#030303]">
          <div className="max-w-6xl mx-auto px-6 relative z-10">
            <div className="text-center max-w-2xl mx-auto mb-16">
              <h2 className="text-xs font-mono tracking-widest text-purple-400 uppercase mb-3">06 // Recognition</h2>
              <h3 className="text-3xl sm:text-4xl font-bold tracking-tight text-white font-display">Honors & Publications</h3>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              {achievements.map((ach, idx) => (
                <div key={idx} className="glass-panel p-8 rounded-3xl glow-card hover:border-zinc-700/80 transition-all duration-300 flex flex-col justify-between">
                  <div>
                    <div className="flex items-center justify-between mb-6">
                      <span className="px-2.5 py-1 rounded bg-zinc-950 border border-zinc-900 text-[10px] font-mono text-zinc-400 uppercase tracking-wider">
                        {ach.category}
                      </span>
                      <div className="w-8 h-8 rounded-lg bg-zinc-900 border border-zinc-850 flex items-center justify-center text-purple-400">
                        {getIcon(ach.icon)}
                      </div>
                    </div>

                    <h4 className="text-base font-bold text-white mb-3">{ach.title}</h4>
                    <p className="text-zinc-400 text-sm leading-relaxed">{ach.desc}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // Blog Component
    function Blog({ blog }) {
      return (
        <section id="blog" className="py-24 relative overflow-hidden bg-[#030303]">
          <div className="max-w-6xl mx-auto px-6 relative z-10">
            <div className="flex flex-col md:flex-row md:items-end justify-between mb-16">
              <div>
                <h2 className="text-xs font-mono tracking-widest text-purple-400 uppercase mb-3">07 // Writing</h2>
                <h3 className="text-3xl sm:text-4xl font-bold tracking-tight text-white font-display">Research & Dev Logs</h3>
              </div>
              <p className="text-zinc-500 text-sm mt-4 md:mt-0 font-mono">// Documenting experiments and engineering patterns</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              {blog.map((post, idx) => (
                <a key={idx} href={post.url} className="glass-panel p-8 rounded-3xl glow-card hover:border-zinc-700/80 transition-all duration-300 flex flex-col justify-between group">
                  <div>
                    <div className="flex items-center gap-4 text-xs font-mono text-zinc-500 mb-6">
                      <span className="flex items-center gap-1">
                        <Icons.Calendar />
                        {post.date}
                      </span>
                      <span className="flex items-center gap-1">
                        <Icons.Clock />
                        {post.readTime}
                      </span>
                    </div>

                    <h4 className="text-lg font-bold text-white mb-3 group-hover:text-purple-400 transition-colors flex items-center justify-between">
                      {post.title}
                      <span className="text-zinc-600 group-hover:text-purple-400 transition-colors"><Icons.ArrowUpRight /></span>
                    </h4>

                    <p className="text-zinc-400 text-sm leading-relaxed mb-6">{post.desc}</p>
                  </div>

                  <div className="flex flex-wrap gap-2 pt-4 border-t border-zinc-900">
                    {post.tags.map((tag, tIdx) => (
                      <span key={tIdx} className="px-2.5 py-1 rounded bg-zinc-950 border border-zinc-900 text-[10px] text-zinc-400 font-mono">{tag}</span>
                    ))}
                  </div>
                </a>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // Contact Component
    function Contact({ profile }) {
      const [formData, setFormData] = useState({ name: "", email: "", affiliation: "", message: "" });
      const [submitted, setSubmitted] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        setSubmitted(true);
        setTimeout(() => {
          setSubmitted(false);
          setFormData({ name: "", email: "", affiliation: "", message: "" });
        }, 4000);
      };

      return (
        <section id="contact" className="py-24 relative overflow-hidden bg-[#030303]">
          <div className="absolute bottom-0 left-1/4 -translate-x-1/2 w-96 h-96 bg-purple-500/5 rounded-full blur-[120px] pointer-events-none" />

          <div className="max-w-6xl mx-auto px-6 relative z-10">
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
              <div className="lg:col-span-5 flex flex-col justify-between h-full">
                <div>
                  <h2 className="text-xs font-mono tracking-widest text-purple-400 uppercase mb-3">08 // Connect</h2>
                  <h3 className="text-3xl sm:text-4xl font-bold tracking-tight text-white mb-6 font-display">Start a Collaboration</h3>
                  <p className="text-zinc-400 text-base leading-relaxed mb-8">
                    Whether you're looking to collaborate on a wearable bio-sensing research paper, deploy custom IoT architectures, or discuss on-device machine learning systems, I'm always open to discussing new engineering projects.
                  </p>
                </div>

                <div className="space-y-6 pt-6 border-t border-zinc-900 font-mono text-sm text-zinc-400">
                  <div className="flex items-center gap-3">
                    <div className="w-9 h-9 rounded-lg bg-zinc-950 border border-zinc-900 flex items-center justify-center text-purple-400">
                      <Icons.Mail />
                    </div>
                    <span>{profile.email}</span>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="w-9 h-9 rounded-lg bg-zinc-950 border border-zinc-900 flex items-center justify-center text-blue-400">
                      <Icons.MapPin />
                    </div>
                    <span>{profile.location}</span>
                  </div>
                </div>
              </div>

              <div className="lg:col-span-7 w-full">
                <div className="glass-panel p-8 sm:p-10 rounded-3xl glow-card">
                  {submitted ? (
                    <div className="flex flex-col items-center justify-center py-12 text-center">
                      <div className="text-emerald-400 mb-4 animate-bounce"><Icons.CheckCircle /></div>
                      <h4 className="text-xl font-bold text-white mb-2">Message Sent</h4>
                      <p className="text-zinc-400 text-sm max-w-sm">
                        Thank you. I've received your request and will reply via email shortly.
                      </p>
                    </div>
                  ) : (
                    <form onSubmit={handleSubmit} className="space-y-6">
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div className="flex flex-col gap-2">
                          <label htmlFor="name" className="text-xs font-mono text-zinc-400 uppercase">Your Name</label>
                          <input
                            type="text"
                            id="name"
                            required
                            value={formData.name}
                            onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                            placeholder="Newton"
                            className="px-4 py-3 rounded-xl bg-zinc-950 border border-zinc-900 text-sm text-white placeholder-zinc-700 focus:outline-none focus:border-zinc-700 transition-colors"
                          />
                        </div>

                        <div className="flex flex-col gap-2">
                          <label htmlFor="email" className="text-xs font-mono text-zinc-400 uppercase">Email Address</label>
                          <input
                            type="type"
                            id="email"
                            required
                            value={formData.email}
                            onChange={(e) => setFormData({ ...formData, email: e.target.value })}
                            placeholder="newton@mit.edu"
                            className="px-4 py-3 rounded-xl bg-zinc-950 border border-zinc-900 text-sm text-white placeholder-zinc-700 focus:outline-none focus:border-zinc-700 transition-colors"
                          />
                        </div>
                      </div>

                      <div className="flex flex-col gap-2">
                        <label htmlFor="affiliation" className="text-xs font-mono text-zinc-400 uppercase">Institution / Corporate Affiliation</label>
                        <input
                          type="text"
                          id="affiliation"
                          value={formData.affiliation}
                          onChange={(e) => setFormData({ ...formData, affiliation: e.target.value })}
                          placeholder="e.g. Research Center / Company"
                          className="px-4 py-3 rounded-xl bg-zinc-950 border border-zinc-900 text-sm text-white placeholder-zinc-700 focus:outline-none focus:border-zinc-700 transition-colors"
                        />
                      </div>

                      <div className="flex flex-col gap-2">
                        <label htmlFor="message" className="text-xs font-mono text-zinc-400 uppercase">Collaboration Details</label>
                        <textarea
                          id="message"
                          required
                          rows={5}
                          value={formData.message}
                          onChange={(e) => setFormData({ ...formData, message: e.target.value })}
                          placeholder="Describe the research or system requirements..."
                          className="px-4 py-3 rounded-xl bg-zinc-950 border border-zinc-900 text-sm text-white placeholder-zinc-700 focus:outline-none focus:border-zinc-700 transition-colors resize-none"
                        />
                      </div>

                      <button
                        type="submit"
                        className="w-full flex items-center justify-center gap-2 px-6 py-4 rounded-xl bg-white hover:bg-zinc-200 text-black font-semibold transition-all duration-300 shadow-[0_4px_20px_rgba(255,255,255,0.1)] group"
                      >
                        Submit Request
                        <span className="transition-transform duration-300 group-hover:translate-x-0.5 group-hover:-translate-y-0.5"><Icons.Send /></span>
                      </button>
                    </form>
                  )}
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // Footer Component
    function Footer({ profile }) {
      const currentYear = new Date().getFullYear();

      return (
        <footer className="bg-[#030303] border-t border-zinc-900 py-12">
          <div className="max-w-6xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-6">
            <div className="flex items-center gap-2 text-zinc-500 text-sm font-mono">
              <div className="text-purple-500"><Icons.Cpu /></div>
              <span>&copy; {currentYear} {profile.name}. All rights reserved.</span>
            </div>

            <div className="flex items-center gap-1.5 text-zinc-500 text-xs font-mono">
              <span>Engineered with</span>
              <span className="text-red-500"><Icons.Heart /></span>
              <span>for Healthcare</span>
            </div>

            <div className="flex items-center gap-4 text-zinc-500">
              <a href={profile.github} target="_blank" rel="noopener noreferrer" className="hover:text-white transition-colors">
                <Icons.Github />
              </a>
              <a href={profile.linkedin} target="_blank" rel="noopener noreferrer" className="hover:text-white transition-colors">
                <Icons.Linkedin />
              </a>
            </div>
          </div>
        </footer>
      );
    }

    // Main App Component
    function App() {
      const data = window.portfolioData;
      if (!data) return <div className="text-white text-center py-20 font-mono">Loading dynamic configuration...</div>;

      return (
        <div className="relative min-h-screen bg-[#030303] overflow-x-hidden">
          <div className="absolute inset-0 bg-[radial-gradient(#1c1c1f_1px,transparent_1px)] [background-size:24px_24px] opacity-15 pointer-events-none" />
          <Navbar profile={data.profile} />
          <Hero profile={data.profile} />
          <About profile={data.profile} specialties={data.specialties} />
          <Experience experiences={data.experiences} />
          <Projects projects={data.projects} />
          <Research research={data.research} />
          <TechStack techStack={data.techStack} />
          <Achievements achievements={data.achievements} />
          <Blog blog={data.blog} />
          <Contact profile={data.profile} />
          <Footer profile={data.profile} />
        </div>
      );
    }

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
